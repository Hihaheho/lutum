[workspace]
members = ["agents-macros"]

[package]
name = "agents"
version = "0.1.0"
edition = "2024"

[dependencies]
agents-macros = { path = "agents-macros" }
async-stream = "0.3"
async-trait = "0.1.89"
bon = "3"
bytes = "1"
futures = "0.3"
reqwest = { version = "0.13", features = ["json", "stream"] }
schemars = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
